[package]
name = "sz-orm-timeseries"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "SZ-ORM TimescaleDB Extension - Time-series data storage and aggregation"

[features]
default = []
real-timescale = ["tokio-postgres"]

[dependencies]
async-trait = "0.1"
tokio = { version = "1.40", features = ["full"] }
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
tokio-postgres = { version = "0.7", optional = true }

[dev-dependencies]
tokio-test = "0.4"
