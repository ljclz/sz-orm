[package]
name = "sz-orm-scheduler"
version = "0.1.0"
edition = "2021"
description = "SZ-ORM Scheduler Extension - Task scheduling with cron support"
authors = ["SZ-ORM Team"]
license = "MIT"
repository = "https://github.com/sz-orm/sz-orm"

[dependencies]
tokio = { version = "1.40", features = ["full"] }
async-trait = "0.1"
chrono = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"

[dev-dependencies]
tokio = { version = "1.40", features = ["full"] }
