[package]
name = "sz-orm-scheduler"
version.workspace = true
edition.workspace = true
description = "SZ-ORM Scheduler Extension - Task scheduling with cron support"
authors.workspace = true
license.workspace = true
repository = "https://github.com/sz-orm/sz-orm"

[dependencies]
tokio = { version = "1.40", features = ["full"] }
async-trait = "0.1"
chrono = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"

[dev-dependencies]
tokio = { version = "1.40", features = ["full"] }
