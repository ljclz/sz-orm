[package]
name = "sz-orm-queue"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "SZ-ORM Message Queue Extension - 6 MQ Providers"

[features]
default = []
rabbitmq = ["lapin"]

[dependencies]
async-trait = "0.1"
tokio = { version = "1.40", features = ["full"] }
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
futures = "0.3"
lapin = { version = "4", optional = true }

[dev-dependencies]
tokio-test = "0.4"