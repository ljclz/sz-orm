[package]
name = "sz-orm-mig"
version = "0.1.0"
edition = "2021"
authors = ["SZ-ORM Team"]
license = "MIT"
description = "SZ-ORM Migration Extension - Cross-database migration"

[dependencies]
async-trait = "0.1"
tokio = { version = "1.40", features = ["full"] }
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[dev-dependencies]
tokio-test = "0.4"