[package]
name = "sz-orm-websocket"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "SZ-ORM WebSocket Extension"

[features]
default = []
server = ["tokio-tungstenite", "futures-util"]

[dependencies]
async-trait = "0.1"
tokio = { version = "1.40", features = ["full"] }
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio-tungstenite = { version = "0.30", optional = true }
futures-util = { version = "0.3", optional = true, default-features = false, features = ["sink", "std"] }

[dev-dependencies]
tokio-test = "0.4"