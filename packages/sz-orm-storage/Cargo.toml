[package]
name = "sz-orm-storage"
version = "0.1.0"
edition = "2021"
authors = ["SZ-ORM Team"]
license = "MIT"
description = "SZ-ORM Storage Extension - 7 Cloud Storage Providers"

[features]
default = []
s3-sdk = ["rust-s3"]

[dependencies]
async-trait = "0.1"
tokio = { version = "1.40", features = ["full"] }
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rust-s3 = { version = "0.37", optional = true }

[dev-dependencies]
tokio-test = "0.4"