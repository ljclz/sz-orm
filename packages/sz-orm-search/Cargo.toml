[package]
name = "sz-orm-search"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "SZ-ORM Search Extension - Multi-provider full-text search (ES/OpenSearch/Meilisearch)"

[features]
default = []
real-es = ["elasticsearch"]
real-opensearch = ["opensearch", "url"]
real-meilisearch = ["meilisearch-sdk"]

[dependencies]
async-trait = "0.1"
tokio = { version = "1.40", features = ["full"] }
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
elasticsearch = { version = "8.5.0-alpha.1", optional = true, default-features = false, features = ["rustls-tls"] }
opensearch = { version = "2.2.0", optional = true, default-features = false, features = ["rustls-tls"] }
meilisearch-sdk = { version = "0.27.1", optional = true }
url = { version = "2.5", optional = true }

[dev-dependencies]
tokio-test = "0.4"
