[package]
name = "sz-orm-crypto"
version = "0.1.0"
edition = "2021"
description = "SZ-ORM Crypto Extension - Encryption, password hashing, and API signing"
authors = ["SZ-ORM Team"]
license = "MIT"
repository = "https://github.com/sz-orm/sz-orm"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
hmac = "0.12"
aes-gcm = "0.10"
pbkdf2 = { version = "0.12", features = ["simple"] }
rand = "0.8"
subtle = "2.5"

[dev-dependencies]
