[package]
name = "sz-orm-tracing"
version.workspace = true
edition.workspace = true
description = "SZ-ORM Tracing Extension - Distributed tracing with OpenTelemetry support"
authors.workspace = true
license.workspace = true
repository = "https://github.com/sz-orm/sz-orm"

[features]
default = []
# 启用 OTLP exporter，将 Span 导出到 OpenTelemetry Collector
# 使用：cargo build --features otlp
otlp = [
    "dep:opentelemetry",
    "dep:opentelemetry-otlp",
    "dep:opentelemetry_sdk",
    "dep:tokio",
]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
# OTLP exporter 依赖（可选）
opentelemetry = { version = "0.27", optional = true }
opentelemetry-otlp = { version = "0.27", optional = true, features = ["tokio"] }
opentelemetry_sdk = { version = "0.27", optional = true, features = ["rt-tokio"] }
tokio = { workspace = true, optional = true }

[dev-dependencies]
