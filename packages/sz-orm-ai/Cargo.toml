[package]
name = "sz-orm-ai"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "SZ-ORM AI Extension - Embedding, Vector Store, RAG Engine"

[dependencies]
async-trait = "0.1"
tokio = { version = "1.40", features = ["full"] }
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[dev-dependencies]
tokio-test = "0.4"

[[test]]
name = "ai_tests"
path = "tests/ai_tests.rs"