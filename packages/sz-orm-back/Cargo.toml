[package]
name = "sz-orm-back"
description = "Backup/restore: SQL dump/load, incremental backup, SHA-256 verification"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
async-trait = "0.1"
tokio = { version = "1.40", features = ["full"] }
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { workspace = true }
flate2 = "1.0"
sha2 = "0.10"

[dev-dependencies]
tokio-test = "0.4"