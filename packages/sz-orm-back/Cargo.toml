[package]
name = "sz-orm-back"
description = "Backup/restore: SQL dump/load, incremental backup, SHA-256 verification"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true

[dependencies]
async-trait = "0.1"
tokio = { version = "1.40", features = ["full"] }
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { workspace = true }
flate2 = "1.0"
sha2 = "0.10"
# 高级备份功能所需：zstd 压缩与 AES-GCM 加密（复用 sz-orm-crypto）
zstd = "0.13"
sz-orm-crypto = { version = "1.0.0", path = "../sz-orm-crypto" }

[dev-dependencies]
tokio-test = "0.4"