name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ============================================================================
  # Job 1: 代码格式检查 + clippy 静态分析
  # ============================================================================
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ============================================================================
  # Job 2: 工作空间编译验证
  # ============================================================================
  build:
    name: Build (${{ matrix.os }}, Rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ matrix.rust }}-

      - name: Build workspace
        run: cargo build --workspace --all-targets --verbose

      - name: Build documentation (all platforms, skip --all-features to avoid pulsar/rdkafka native deps)
        run: cargo doc --workspace --no-deps

  # ============================================================================
  # Job 2.5: cargo-hack — 每个 feature 独立编译验证
  #
  # 改进2：安装 cargo-hack 并加入 CI
  # 验证每个 feature 在单独启用时能正确编译，避免 feature 间隐藏依赖
  # ============================================================================
  feature-matrix:
    name: Feature Matrix (cargo-hack)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-hack-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-hack-

      - name: Install cargo-hack
        run: cargo install cargo-hack --locked

      - name: Install native deps (protoc + cmake for pulsar/rdkafka features)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler cmake

      - name: Check each feature compiles independently
        run: cargo hack check --workspace --each-feature --no-dev-deps

  # ============================================================================
  # Job 2.6: cargo-udeps — 未使用依赖检测
  #
  # 改进3：安装 cargo-udeps 并加入 CI
  # 检测 Cargo.toml 中声明但代码未使用的依赖，避免依赖膨胀
  # 需要 nightly 工具链
  # ============================================================================
  unused-deps:
    name: Unused Dependencies (cargo-udeps)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-udeps-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-udeps-

      - name: Install cargo-udeps
        run: cargo install cargo-udeps --locked

      - name: Detect unused dependencies
        continue-on-error: true
        run: cargo +nightly udeps --workspace --all-targets || true

  # ============================================================================
  # Job 3: 工作空间单元/集成测试（无外部数据库）
  # ============================================================================
  test:
    name: Test Suite (no external DB)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Run workspace tests (excludes #[ignore] integration tests)
        run: cargo test --workspace --verbose

      - name: Run SQLite integration tests
        run: cargo test --package sz-orm-core --test integration_sqlite --verbose

  # ============================================================================
  # Job 3.5: v0.2.2 修复 P1-5：real-* feature 编译验证
  #
  # 确保 sz-orm-postgis / sz-orm-timeseries / sz-orm-search 三个生态包的
  # real-* feature 在 CI 上能正确编译（防止伪实现/编译错误逃逸到 main）。
  # ============================================================================
  real-features-compile:
    name: Real-* Features Compile Check
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-real-features-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-real-features-

      - name: Check sz-orm-postgis (real-postgis)
        run: cargo check --package sz-orm-postgis --features real-postgis --verbose

      - name: Check sz-orm-timeseries (real-timescale)
        run: cargo check --package sz-orm-timeseries --features real-timescale --verbose

      - name: Check sz-orm-search (real-es)
        run: cargo check --package sz-orm-search --features real-es --verbose

      - name: Check sz-orm-search (real-opensearch)
        run: cargo check --package sz-orm-search --features real-opensearch --verbose

      - name: Check sz-orm-search (real-meilisearch)
        run: cargo check --package sz-orm-search --features real-meilisearch --verbose

      - name: Check sz-orm-search (all real-* features)
        run: cargo check --package sz-orm-search --features "real-es,real-opensearch,real-meilisearch" --verbose

  # ============================================================================
  # Job 4: 真实数据库集成测试（MySQL + PostgreSQL + SQLite）
  # ============================================================================
  integration-test:
    name: Integration Tests (MySQL ${{ matrix.mysql }}, PG ${{ matrix.pg }})
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - mysql: "8.0"
            pg: "14"
          - mysql: "8.4"
            pg: "16"
          - mysql: "9.7"
            pg: "18"
    services:
      mysql:
        image: mysql:${{ matrix.mysql }}
        env:
          MYSQL_ROOT_PASSWORD: test123
          MYSQL_DATABASE: sz_orm_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -ptest123"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      postgres:
        image: postgres:${{ matrix.pg }}
        env:
          POSTGRES_PASSWORD: test123
          POSTGRES_DB: sz_orm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      MYSQL_URL: mysql://root:test123@127.0.0.1:3306/sz_orm_test
      PG_URL: postgres://postgres:test123@127.0.0.1:5432/sz_orm_test

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-int-${{ matrix.mysql }}-${{ matrix.pg }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-int-

      - name: Run MySQL integration tests (10 万条 + 8 任务并发)
        run: cargo test --package sz-orm-core --test integration_mysql -- --ignored --nocapture --test-threads=1

      - name: Run PostgreSQL integration tests (10 万条 + 8 任务并发)
        run: cargo test --package sz-orm-core --test integration_pg -- --ignored --nocapture --test-threads=1

  # ============================================================================
  # Job 5: 真实服务集成测试（真实 DB + 云服务，全部 #[ignore] 用例）
  # ============================================================================
  integration:
    name: Real Service Integration (MySQL ${{ matrix.mysql }}, PG ${{ matrix.pg }})
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        mysql: ["8.0", "9.7"]
        pg: ["14", "16", "18"]
    services:
      mysql:
        image: mysql:${{ matrix.mysql }}
        env:
          MYSQL_ROOT_PASSWORD: test123
          MYSQL_DATABASE: sz_orm_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -ptest123"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      postgres:
        image: postgres:${{ matrix.pg }}
        env:
          POSTGRES_PASSWORD: test123
          POSTGRES_DB: sz_orm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      rabbitmq:
        image: rabbitmq:3.13
        ports:
          - 5672:5672
        options: >-
          --health-cmd="rabbitmq-diagnostics -q ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s
      mosquitto:
        image: eclipse-mosquitto:2.0
        ports:
          - 1883:1883
      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
        options: >-
          --health-cmd="curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      MYSQL_URL: mysql://root:test123@127.0.0.1:3306/sz_orm_test
      PG_URL: postgres://postgres:test123@127.0.0.1:5432/sz_orm_test
      S3_TEST_ENDPOINT: http://127.0.0.1:9000
      S3_TEST_BUCKET: test-bucket
      S3_TEST_REGION: us-east-1
      S3_TEST_ACCESS_KEY: minioadmin
      S3_TEST_SECRET_KEY: minioadmin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-integration-${{ matrix.mysql }}-${{ matrix.pg }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-integration-

      - name: Wait for MQTT broker (port 1883)
        run: |
          for i in $(seq 1 30); do
            if (exec 3<>/dev/tcp/127.0.0.1/1883) 2>/dev/null; then
              echo "MQTT broker is ready"
              exit 0
            fi
            echo "waiting for MQTT broker... ($i)"
            sleep 1
          done
          echo "MQTT broker did not become ready in time"
          exit 1

      - name: Create MinIO test bucket (test-bucket)
        run: |
          docker run --rm --network host --entrypoint /bin/sh minio/mc:latest -c "
            until mc alias set local http://127.0.0.1:9000 minioadmin minioadmin; do
              echo 'waiting for MinIO...' && sleep 2
            done &&
            mc mb --ignore-existing local/test-bucket
          "

      - name: Run real DB pool/transaction tests (sz-orm-sqlx, MySQL + PG)
        run: cargo test --package sz-orm-sqlx --test real_db_pool_tests -- --ignored --nocapture --test-threads=1

      - name: Run real MQTT broker tests (sz-orm-mqtt, real-broker)
        run: cargo test --package sz-orm-mqtt --features real-broker -- --ignored --nocapture

      - name: Run real RabbitMQ tests (sz-orm-queue, rabbitmq)
        run: cargo test --package sz-orm-queue --features rabbitmq -- --ignored --nocapture

      - name: Run real S3/MinIO tests (sz-orm-storage, s3-sdk)
        run: cargo test --package sz-orm-storage --features s3-sdk -- --ignored --nocapture

      - name: Run real WebSocket server tests (sz-orm-websocket, server)
        run: cargo test --package sz-orm-websocket --features server -- --ignored --nocapture

  # ============================================================================
  # Job 5.5: 真实 MQ 集成测试（RabbitMQ + NATS + Kafka + ActiveMQ + Pulsar）
  #
  # 使用 service container 启动 5 种 MQ broker，运行 sz-orm-queue 的真实客户端测试。
  # 覆盖 publish/consume/ack/subscribe 全流程。
  # Pulsar 需 protoc，Kafka 需 cmake（Linux 已预装）。
  # ============================================================================
  mq-integration:
    name: Real MQ Integration (RabbitMQ + NATS + Kafka + ActiveMQ + Pulsar)
    runs-on: ubuntu-latest
    needs: [test]
    services:
      # RabbitMQ: AMQP 0.9.1（lapin 客户端）
      rabbitmq:
        image: rabbitmq:3.13
        ports:
          - 5672:5672
        options: >-
          --health-cmd="rabbitmq-diagnostics -q ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s
      # NATS: 纯 Rust 客户端
      nats:
        image: nats:2.10
        ports:
          - 4222:4222
        options: >-
          --health-cmd="wget -qO- http://localhost:8222/healthz || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      # Kafka: rdkafka 客户端（需 cmake，Linux 已预装）
      kafka:
        image: bitnami/kafka:3.7
        ports:
          - 9092:9092
        env:
          KAFKA_CFG_NODE_ID: 1
          KAFKA_CFG_PROCESS_ROLES: controller,broker
          KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://127.0.0.1:9092
          KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@127.0.0.1:9093
          KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
        options: >-
          --health-cmd="kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list"
          --health-interval=10s
          --health-timeout=10s
          --health-retries=15
          --health-start-period=30s
      # ActiveMQ Artemis: AMQP 1.0（lapin 客户端）
      activemq:
        image: vromero/activemq-artemis:2.33-alpine
        ports:
          - 61616:61616
        env:
          ARTEMIS_USER: artemis
          ARTEMIS_PASSWORD: artemis
        options: >-
          --health-cmd="/opt/activemq-artemis/bin/artemis check queue || exit 1"
          --health-interval=15s
          --health-timeout=10s
          --health-retries=15
          --health-start-period=60s
      # Pulsar: pulsar crate（需 protoc，Linux 已预装）
      pulsar:
        image: apachepulsar/pulsar:3.2.0
        ports:
          - 6650:6650
        options: >-
          --health-cmd="curl -f http://localhost:8080/admin/v2/clusters/local || exit 1"
          --health-interval=15s
          --health-timeout=10s
          --health-retries=20
          --health-start-period=60s
    env:
      RABBITMQ_URL: amqp://guest:guest@127.0.0.1:5672//
      NATS_URL: nats://127.0.0.1:4222
      KAFKA_BROKERS: 127.0.0.1:9092
      ACTIVEMQ_URL: amqp://artemis:artemis@127.0.0.1:61616
      PULSAR_URL: pulsar://127.0.0.1:6650

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc (for pulsar crate)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-mq-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-mq-

      - name: Verify MQ brokers are ready
        run: |
          echo "Waiting for all MQ brokers to be ready..."
          # RabbitMQ
          for i in $(seq 1 30); do
            if (exec 3<>/dev/tcp/127.0.0.1/5672) 2>/dev/null; then echo "RabbitMQ ready"; break; fi
            echo "waiting RabbitMQ... ($i)"; sleep 2
          done
          # NATS
          for i in $(seq 1 30); do
            if (exec 3<>/dev/tcp/127.0.0.1/4222) 2>/dev/null; then echo "NATS ready"; break; fi
            echo "waiting NATS... ($i)"; sleep 2
          done
          # Kafka
          for i in $(seq 1 60); do
            if (exec 3<>/dev/tcp/127.0.0.1/9092) 2>/dev/null; then echo "Kafka ready"; break; fi
            echo "waiting Kafka... ($i)"; sleep 2
          done
          # ActiveMQ
          for i in $(seq 1 60); do
            if (exec 3<>/dev/tcp/127.0.0.1/61616) 2>/dev/null; then echo "ActiveMQ ready"; break; fi
            echo "waiting ActiveMQ... ($i)"; sleep 2
          done
          # Pulsar
          for i in $(seq 1 60); do
            if (exec 3<>/dev/tcp/127.0.0.1/6650) 2>/dev/null; then echo "Pulsar ready"; break; fi
            echo "waiting Pulsar... ($i)"; sleep 2
          done

      - name: RabbitMQ real tests (lapin, AMQP 0.9.1)
        env:
          RABBITMQ_URL: amqp://guest:guest@127.0.0.1:5672//
        run: cargo test --package sz-orm-queue --features rabbitmq -- --ignored --nocapture --test-threads=1

      - name: NATS real tests (async-nats)
        env:
          NATS_URL: nats://127.0.0.1:4222
        run: cargo test --package sz-orm-queue --features nats -- --ignored --nocapture --test-threads=1

      - name: ActiveMQ real tests (lapin, AMQP 1.0)
        env:
          ACTIVEMQ_URL: amqp://artemis:artemis@127.0.0.1:61616
        run: cargo test --package sz-orm-queue --features activemq -- --ignored --nocapture --test-threads=1

      - name: Pulsar real tests (pulsar crate)
        env:
          PULSAR_URL: pulsar://127.0.0.1:6650
        run: cargo test --package sz-orm-queue --features pulsar -- --ignored --nocapture --test-threads=1

      - name: Kafka real tests (rdkafka)
        env:
          KAFKA_BROKERS: 127.0.0.1:9092
        run: cargo test --package sz-orm-queue --features kafka -- --ignored --nocapture --test-threads=1

      - name: All-real features compile check
        run: cargo check --package sz-orm-queue --features "all-real" --verbose

  # ============================================================================
  # Job 6: 性能基准测试（criterion，结果对比）
  # ============================================================================
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      - name: Run criterion benchmarks
        run: cargo bench --package sz-orm-core --bench core_bench -- --warm-up-time 1 --measurement-time 3 --sample-size 30

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: criterion-results-${{ github.sha }}
          path: target/criterion/
          retention-days: 30

  # ============================================================================
  # Job 6.5: v0.2.2 修复 P2-4：Soak Test 冒烟验证（Linux 平台）
  #
  # 每次 push/PR 在 Linux 上运行 10 秒 Soak 冒烟测试，验证：
  # - Soak 框架自身正确性（不退化、不 panic）
  # - CSV 报告生成正常
  # - thread_count/RSS/fd_count 字段可读
  # 周末长时 24h Soak 由 soak.yml 周期触发。
  # ============================================================================
  soak-smoke:
    name: Soak Smoke Test (Linux, 10s)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-soak-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-soak-

      - name: Run soak smoke test (10s, non-ignored)
        run: cargo test --package sz-orm-core --test soak soak_smoke_10s -- --nocapture --test-threads=1

      - name: Upload soak smoke CSV report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-smoke-${{ github.sha }}
          path: target/soak-report.csv
          if-no-files-found: warn
          retention-days: 7

  # ============================================================================
  # Job 7: 安全审计
  # ============================================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        run: |
          cargo audit \
            --no-yanked \
            --ignore RUSTSEC-2026-0049 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2026-0104 \
            --ignore RUSTSEC-2026-0194 \
            --ignore RUSTSEC-2026-0195 \
            --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2024-0436

  # ============================================================================
  # Job 8: 覆盖率报告
  # ============================================================================
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Run coverage
        run: cargo tarpaulin --workspace --out Xml --output-dir coverage/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/cobertura.xml
          fail_ci_if_error: false
