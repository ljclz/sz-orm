# =============================================================================
# 真实服务集成测试工作流
# 触发: 推送 / PR 到 main/master/develop 分支、手动触发、每日定时
# 内容: 通过 services 启动全部依赖服务（MySQL 9.6 / PostgreSQL 18 /
#       RabbitMQ 3.13 / Mosquitto 2.0 / MinIO），运行工作空间中所有
#       #[ignore] 标注的真实 DB / 云服务集成测试
# =============================================================================
name: Integration

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
  schedule:
    # 每日 02:00 (Asia/Shanghai, UTC+8) 运行完整真实服务集成测试
    - cron: "0 18 * * *"

env:
  CARGO_TERM_COLOR: always

jobs:
  integration:
    name: Real Service Integration Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:9.7
        env:
          MYSQL_ROOT_PASSWORD: <your-password>
          MYSQL_DATABASE: sz_orm_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -p<your-password>"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: <your-password>
          POSTGRES_DB: sz_orm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      rabbitmq:
        image: rabbitmq:3.13
        ports:
          - 5672:5672
        options: >-
          --health-cmd="rabbitmq-diagnostics -q ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s
      mosquitto:
        image: eclipse-mosquitto:2.0
        ports:
          - 1883:1883
      minio:
        image: minio/minio:RELEASE.2024-12-18T13-15-44Z
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
        options: >-
          --entrypoint=minio
          server /data
    env:
      MYSQL_URL: mysql://root:<your-password>@127.0.0.1:3306/sz_orm_test
      PG_URL: postgres://postgres:<your-password>@127.0.0.1:5432/sz_orm_test
      S3_TEST_ENDPOINT: http://127.0.0.1:9000
      S3_TEST_BUCKET: test-bucket
      S3_TEST_REGION: us-east-1
      S3_TEST_ACCESS_KEY: minioadmin
      S3_TEST_SECRET_KEY: minioadmin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-integration-all-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-integration-all-

      - name: Wait for MQTT broker (port 1883)
        run: |
          for i in $(seq 1 30); do
            if (exec 3<>/dev/tcp/127.0.0.1/1883) 2>/dev/null; then
              echo "MQTT broker is ready"
              exit 0
            fi
            echo "waiting for MQTT broker... ($i)"
            sleep 1
          done
          echo "MQTT broker did not become ready in time"
          exit 1

      - name: Create MinIO test bucket (test-bucket)
        run: |
          docker run --rm --network host --entrypoint /bin/sh minio/mc:latest -c "
            until mc alias set local http://127.0.0.1:9000 minioadmin minioadmin; do
              echo 'waiting for MinIO...' && sleep 2
            done &&
            mc mb --ignore-existing local/test-bucket
          "

      - name: Run sz-orm-core MySQL integration tests (10 万条 + 8 任务并发)
        run: cargo test --package sz-orm-core --test integration_mysql -- --ignored --nocapture --test-threads=1

      - name: Run sz-orm-core PostgreSQL integration tests (10 万条 + 8 任务并发)
        run: cargo test --package sz-orm-core --test integration_pg -- --ignored --nocapture --test-threads=1

      - name: Run real DB pool/transaction tests (sz-orm-sqlx)
        run: cargo test --package sz-orm-sqlx --test real_db_pool_tests -- --ignored --nocapture --test-threads=1

      - name: Run real DB jepsen-style tests (sz-orm-sqlx)
        run: cargo test --package sz-orm-sqlx --test real_db_jepsen -- --ignored --nocapture --test-threads=1

      - name: Run real MQTT broker tests (sz-orm-mqtt, real-broker)
        run: cargo test --package sz-orm-mqtt --features real-broker -- --ignored --nocapture

      - name: Run real RabbitMQ tests (sz-orm-queue, rabbitmq)
        run: cargo test --package sz-orm-queue --features rabbitmq -- --ignored --nocapture

      - name: Run real S3/MinIO tests (sz-orm-storage, s3-sdk)
        run: cargo test --package sz-orm-storage --features s3-sdk -- --ignored --nocapture

      - name: Run real WebSocket server tests (sz-orm-websocket, server)
        run: cargo test --package sz-orm-websocket --features server -- --ignored --nocapture
